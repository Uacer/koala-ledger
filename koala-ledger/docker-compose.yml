services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: koala-ledger
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DB_PATH=/data/koala-ledger.db
      - BACKUP_DIR=/backups
      - EXCHANGERATE_HOST_ACCESS_KEY=${EXCHANGERATE_HOST_ACCESS_KEY:-}
    volumes:
      - koala_ledger_data:/data
      - koala_ledger_backups:/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  koala_ledger_data:
  koala_ledger_backups:
